// Sirius GPU execution config for crypto benchmark
// This file is installed to ~/.sirius/sirius.cfg by benchmark.sh
//
// GPU memory sizing guide — adjust for your GPU:
//   GH200 (96GB):  usage_limit_fraction = 0.8, host capacity = 64GB
//   A100  (80GB):  usage_limit_fraction = 0.7, host capacity = 64GB
//   RTX 6000 (24GB): usage_limit_fraction = 0.8, host capacity = 32GB
//   RTX 4090 (24GB): usage_limit_fraction = 0.8, host capacity = 32GB

sirius = {
    topology = {
        num_gpus = 1;
    };
    memory = {
        gpu = {
            // Fraction of GPU VRAM Sirius can use
            // RTX 6000 24GB: 0.8 = ~19GB for data + processing
            usage_limit_fraction = 0.8;
            reservation_limit_fraction = 1.0;
        }
        host = {
            // Host pinned memory for CPU-GPU data transfer
            // Should be <= 50% of system RAM
            capacity_bytes = 32000000000;  // 32 GB
            initial_number_pools = 10;
            pool_size = 512;
            block_size = 1048576;  // 1 MB
        };
        disk = {
            disk_id = 0;
            capacity_bytes = 50000000000;  // 50 GB spill space
            downgrade_root_dirs = "/tmp/sirius_disk_memory";
        };
    };
    executor = {
        pipeline = {
            num_threads = 4;
            thread_name_prefix = "sirius_pipeline_executor";
        };
        downgrade = {
            num_threads = 4;
            thread_name_prefix = "sirius_downgrade_executor";
        };
        duckdb_scan = {
            // Cache levels: "none", "table_gpu", "table_host", "parquet"
            // "table_gpu" keeps decoded tables in GPU memory for hot runs
            cache = "table_gpu";
            num_threads = 5;
            thread_name_prefix = "sirius_scan_executor";
        };
    };
    operator_params = {
        scan_task_batch_size = 536870900;          // 512 MB
        default_scan_task_varchar_size = 256;
        max_sort_partition_bytes = 0;              // 0 = auto (33% GPU memory)
        hash_partition_bytes = 536870900;          // 512 MB
        concat_batch_bytes = 536870900;            // 512 MB
    };
};
